# Use ACP instead of UCM for the laptop's Intel SOF card.
#
# By default this card uses UCM, which exposes the internal speaker and the
# headphone jack as two *mutually exclusive* "HiFi" profiles (the Speaker
# profile has no headphone port, and vice versa). That means there is no
# automatic speaker<->headphone switching: whichever profile is active, the
# other output is simply unreachable.
#
# Disabling UCM (api.alsa.use-ucm = false) forces the legacy ACP card profile,
# which merges both outputs into a single profile where Speaker and Headphones
# are auto-switching ports driven by jack detection — plug in headphones and
# audio follows automatically, unplug and it returns to the speakers.
#
# Trade-off: the ACP fallback profile on this SOF chip does NOT expose the
# HDMI/DisplayPort audio outputs. If HDMI/DP audio is ever needed, this rule
# has to be revisited (UCM is what provides those outputs).
monitor.alsa.rules = [
  {
    matches = [
      {
        device.name = "alsa_card.pci-0000_00_1f.3-platform-skl_hda_dsp_generic"
      }
    ]
    actions = {
      update-props = {
        api.alsa.use-ucm = false
        api.alsa.use-acp = true
      }
    }
  }
]
